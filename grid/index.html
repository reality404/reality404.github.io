<!DOCTYPE html>
<html>

  <head>

    <meta charset="UTF-8">

    <title>Grid</title>

    <style>

      body {
        margin: 0;
        height: 100vh;
        background-color: #000000;
      }

      .grid {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        perspective: 900px;
      }

      .floor {
        width: 200%;
        transform: rotateX(70deg) translateX(-10%) translateY(50%);
        transform-style: preserve-3d;
        background:
        linear-gradient(to right, purple 1px, transparent 1px),
        linear-gradient(to bottom, purple 1px, transparent 1px);
        background-size:40px 100%,100% 40px;
        background-repeat: round;
	      animation: moveFloor 10s linear infinite;
      }

     @keyframes moveFloor {
	     to {
		     background-position-y: 2000px;
	      }
      }

    </style>

  </head>

  <body>

    <div class="grid">
      <div class="floor grid"></div>
    </div>

    <script>

    </script>

  </body>

</html>
