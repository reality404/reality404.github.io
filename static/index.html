<!DOCTYPE html>
<html>
<head>
<style>

  body{
    margin: 0 auto;
    overflow: hidden;
    /*background-color: black;*/
  }

</style>
</head>
<body>

<script>

  const canvas = document.createElement('canvas');  
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);           
  const ctx = canvas.getContext('2d');

  let width = canvas.width, height = canvas.height;

  const canvasO = document.createElement('canvas');
  canvasO.width = width<<1;
  canvasO.height = height<<1;
  const ctxO = canvasO.getContext('2d' ,{alpha: false});

  //Static 
  let imageData = ctxO.createImageData(width<<1, height<<1);
  let buffer32 = new Uint32Array(imageData.data.buffer); 

  //Lets make some noise
  function noise(context) {
    let len = buffer32.length - 1;
    while(len--) buffer32[len] = Math.random() < 0.5 ? 0 : -1>>0;
    context.putImageData(imageData, 0, 0);
  }
  noise(ctxO);

  //Lets loop 
  (function loop() {
    let x = (width * Math.random())|0;                    
    let y = (height * Math.random())|0;
  
     ctx.drawImage(canvasO, -x, -y);                 
    requestAnimationFrame(loop)
  })();

</script>
</body>
</html>
