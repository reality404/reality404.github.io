<!DOCTYPE html>
<html>
<head>
  <title>A Static HTML Page!</title>
<style>

  body{
    margin: 0 auto;
    overflow: hidden;
    /*background-color: black;*/
  }

</style>
</head>
<body>

<script>

  const canvas = document.createElement('canvas');  
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);           
  const ctx = canvas.getContext('2d');

  let width = canvas.width, height = canvas.height;

  const canvasO = document.createElement('canvas');
  canvasO.width = width<<1;
  canvasO.height = height<<1;
  const ctxO = canvasO.getContext('2d');

  let staticColours = ["purple","black"]
  for (let i = 0; i < width<<1; i++) {
    for (let j = 0; j < height<<1; j++) {
       ctxO.fillStyle = staticColours[Math.floor(Math.random()*staticColours.length)];
       ctxO.fillRect(i, j, 1, 1);
    }
  }

  (function loop() {
    let x = (width * Math.random())|0;                    
    let y = (height * Math.random())|0;
  
     ctx.drawImage(canvasO, -x, -y);                 
    requestAnimationFrame(loop)
  })();

</script>
</body>
</html>
