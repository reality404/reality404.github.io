<!DOCTYPE html>
<html>
<head>
  <title>A Static HTML Page!</title>
<style>

  body{
    margin: 0 auto;
    overflow: hidden;
    /*background-color: black;*/
  }

</style>
</head>
<body>

<script>

  //helper functions 
  function per(num, per) {
    return (num/100)*per;
  } 

  const canvas = document.createElement('canvas');  
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);           
  const ctx = canvas.getContext('2d');

  let width = canvas.width, height = canvas.height;

  const canvasO = document.createElement('canvas');
  canvasO.width = per(width,10);
  canvasO.height = per(height,10);
  const ctxO = canvasO.getContext('2d');

  let staticColours = ["purple","black"]

  function static(){
    for (let i = 0; i < canvasO.width; i++) {
      for (let j = 0; j < canvasO.height; j++) {
       ctxO.fillStyle = staticColours[Math.floor(Math.random()*staticColours.length)];
       ctxO.fillRect(i, j, 1, 1);
      }
    }
  }

  (function loop() {

    static();

    for (let i = 0; i < canvasO.width; i++) {
      for (let j = 0; j < canvasO.height; j++) {
        ctx.drawImage(canvasO, canvasO.width*i, canvasO.height*j);  
      }  
    }              
    requestAnimationFrame(loop)
  })();

</script>
</body>
</html>
